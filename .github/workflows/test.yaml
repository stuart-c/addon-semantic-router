name: Test Backend

on: pull_request

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: semantic-router/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r semantic-router/backend/requirements.txt
          pip install -r semantic-router/backend/requirements_test.txt

      - name: Run linting (black)
        run: black --check semantic-router/backend

      - name: Run linting (flake8)
        run: flake8 semantic-router/backend

      - name: Run unit tests (pytest)
        env:
          PYTHONPATH: ${{ github.workspace }}/semantic-router
        run: pytest semantic-router/backend/tests

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage
          path: |
            coverage.xml
            htmlcov/
