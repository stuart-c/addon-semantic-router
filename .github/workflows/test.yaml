name: Test Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: semantic-router/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r semantic-router/backend/requirements.txt
          pip install -r semantic-router/backend/requirements_test.txt

      - name: Run linting (black)
        run: black --check semantic-router/backend

      - name: Run linting (flake8)
        run: flake8 semantic-router/backend

      - name: Run unit tests (pytest)
        env:
          PYTHONPATH: ${{ github.workspace }}/semantic-router
        run: pytest semantic-router/backend/tests

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage
          path: |
            coverage.xml
            htmlcov/
