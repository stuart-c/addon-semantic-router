name: Build Addon

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  prepare:
    name: Prepare Version
    if: "${{ github.event_name != 'push' || contains(github.event.head_commit.message, 'chore: bump addon version') == false }}"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Initialise Version Metadata
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    if: needs.prepare.result == 'success'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./semantic-router
          platforms: linux/${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and Push Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.build.result == 'success' && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="ghcr.io/${{ github.repository }}"

          docker buildx imagetools create \
            $(printf "${REPO}@sha256:%s " *) \
            --tag "${REPO}:${VERSION}" \
            --tag "${REPO}:${TAG}"

  version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: [prepare, merge]
    if: github.event_name == 'release'
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update Addon Version and Changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANGELOG="semantic-router/CHANGELOG.md"
          DATE=$(date +'%Y-%m-%d')

          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" semantic-router/config.yaml

          # Update CHANGELOG.md
          if [ ! -f "$CHANGELOG" ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file.\n" > "$CHANGELOG"
          fi

          printf "## [%s] - %s\n\n%s\n\n" "$VERSION" "$DATE" "$RELEASE_BODY" > "$CHANGELOG.tmp"
          cat "$CHANGELOG" >> "$CHANGELOG.tmp"
          mv "$CHANGELOG.tmp" "$CHANGELOG"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add semantic-router/config.yaml "$CHANGELOG"
          git commit -m "chore: bump addon version to $VERSION and update changelog"
          git pull --rebase origin main
          git push origin HEAD:refs/heads/main

      - name: Generate GitHub App Token for Dispatch
        id: dispatch-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ha-addons

      - name: Dispatch Repository Updater update signal
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: stuart-c/ha-addons
          event-type: update
          client-payload: '{"app": "semantic-router"}'
